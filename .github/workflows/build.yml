name: Build YesDR MkDocs


on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: pip install -r requirements.txt
      - run: mkdocs build

      - name: Upload built site
        uses: actions/upload-artifact@v3
        with:
          name: yesdr-site
          path: site/
