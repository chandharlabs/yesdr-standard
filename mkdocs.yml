site_name: YesDR Standard

site_url: https://yesdr-standard.org
site_description: Your Extensible Software Defined Radio – A modular cellular wireless standard

repo_url: https://github.com/ChandharLabs/yesdr-standard
repo_name: YesDR on GitHub

theme:
  name: material
  logo: images/YesDR_Logo.png
  favicon: images/YesDR_Logo.png

site_description: Your Extensible Software Defined Radio – Modular Cellular Wireless Standard
site_url: https://yesdr-standard.org

theme:
  name: material
  logo: images/YesDR_Logo.png
  favicon: images/YesDR_Logo.png

  font:
    text: Inter
    code: JetBrains Mono
  palette:

    scheme: default

    primary: blue grey
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - content.code.copy

    - search.highlight

nav:
  - Home: index.md
  - About: about.md
  - Pronunciation: pronunciation.md
  - Standards:
      - TS 00.001 – Overall Description: standards/ts-00-001-overall.md
      - TS 00.004 – Architecture: standards/ts-00-004-architecture.md
      - TS 23.501 Mapping: standards/ts-23-501-mapping.md
      - YACP (Control Plane): standards/ts-24-001-yacp.md
      - YSMP (Spectrum): standards/ts-24-002-ysmp.md
      - YUPF (User Plane): standards/ts-29-001-yupf.md
      - YCore (Core): standards/ts-29-002-ycore.md
      - YSMF: standards/YesDR_TS_02_002—YSMF.md
      - YUPF: standards/YesDR_TS_02_003—YUPF.md
      - YUDM: standards/YesDR_TS_02_004—YUDM.md
      - YPCF: standards/YesDR_TS_02_006—YPCF.md
      - YRMF: standards/YesDR_TS_02_007—YRMF.md
      - YCRF: standards/YesDR_TS_02_008—YCRF.md
      - YNRF: standards/YesDR_TS_02_009—YNRF.md
      - YSM: standards/YesDR_TS_02_010—YSM.md
      - YBS: standards/YesDR_TS_02_020—YBS.md
      - YUE: standards/YesDR_TS_02_021—YUE.md
      - YAUSF: standards/YesDR_TS_02_0050—YAUSF.md
      - YACP: standards/YesDR_TS_04_001—YACP.md
      - YSMP: standards/YesDR_TS_04_002—YSMP.md

  - Consortium: consortium.md
  - Roadmap: roadmap.md
  - Contact: contact.md

plugins:
  - search


markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - footnotes
  - def_list
  - attr_list
  - pymdownx.superfences
  - pymdownx.tabbed
  - git-revision-date-localized

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - footnotes
  - attr_list
  - pymdownx.superfences
