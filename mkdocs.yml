site_name: YesDR Standard
site_url: https://yesdr-standard.org
site_description: Your Extensible Software Defined Radio – A modular cellular wireless standard

repo_url: https://github.com/ChandharLabs/yesdr-standard
repo_name: YesDR on GitHub

theme:
  name: material
  logo: images/yesdr-logo.svg
  favicon: images/yesdr-logo.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    scheme: default
    primary: blue grey
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - content.code.copy
    - search.highlight

nav:
  - Home: index.md
  - About YesDR: about.md
  - Standards:
      - TS 00.001 – Overview: standards/ts-0001-overview.md
      - TS 00.004 – Architecture: standards/ts-0004-architecture.md
      - TS 00.005 – YACP: standards/ts-0005-yacp.md
      - TS 00.006 – YSMP: standards/ts-0006-ysmp.md
      - TS 00.007 – YCore: standards/ts-0007-ycore.md
  - Consortium: consortium.md
  - Roadmap: roadmap.md
  - Contact: contact.md

plugins:
  - search
  - git-revision-date-localized

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - footnotes
  - def_list
  - attr_list
  - pymdownx.superfences
  - pymdownx.tabbed
